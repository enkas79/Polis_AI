name: Build Windows Installer

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'version.txt' # Il server partirà SOLO se viene modificato questo file
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Scarica il codice dal repository
      uses: actions/checkout@v4

    # --- NUOVO PASSAGGIO: LEGGE LA VERSIONE ---
    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Installa Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Installa librerie e PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-WebEngine google-genai

    - name: Compila l'eseguibile con PyInstaller
      run: |
        pyinstaller --onedir --noconsole --add-data "assets;assets" --add-data "scenarios;scenarios" --name Polis_AI main.py

    # --- INNO SETUP ORA RICEVE LA VERSIONE DINAMICA ---
    - name: Compila il Setup con Inno Setup
      run: |
        iscc /DMyAppVersion="${{ env.VERSION }}" setup.iss

    # --- SALVA L'INSTALLER CON IL NUMERO DI VERSIONE NEL NOME ---
    - name: Salva il Setup.exe su GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Polis_AI_Installer_v${{ env.VERSION }}
        path: Output/Polis_AI_Setup_v${{ env.VERSION }}.exe
